name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Build frontend (Vite/Inertia)
        run: npm run build

      - name: Prepare server (maintenance mode)
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o IdentitiesOnly=yes "$SSH_USER@$SSH_HOST" "
            cd '$SSH_DEPLOY_PATH'
            php artisan down --retry=60 || true
          "

      - name: Deploy application
        run: |
          rsync -az --delete \
            --exclude="/.git/" \
            --exclude="/.github/" \
            --exclude="/.env" \
            --exclude="/node_modules/" \
            --exclude="/vendor/" \
            --exclude="/storage/" \
            --exclude="/bootstrap/cache/" \
            --exclude="/public/content/" \
            --exclude="/public/files/" \
            --exclude="/public/storage" \
            --exclude="/public/hot" \
            --exclude="/tests/" \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o IdentitiesOnly=yes" \
            ./ \
            "$SSH_USER@$SSH_HOST:$SSH_DEPLOY_PATH/"

      - name: Finish deployment
        if: always()
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o IdentitiesOnly=yes "$SSH_USER@$SSH_HOST" "
            cd '$SSH_DEPLOY_PATH'
            composer install \
              --no-dev \
              --no-interaction \
              --prefer-dist \
              --optimize-autoloader
            php artisan migrate --force
            php artisan optimize:clear
            if [ ! -e public/storage ]; then
              php artisan storage:link
            fi
            php artisan optimize
            php artisan up || true
          "